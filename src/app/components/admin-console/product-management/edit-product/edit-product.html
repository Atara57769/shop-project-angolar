<div class="form-shell">
  <div class="form-head">
    <p class="helper">Update product details and save changes.</p>
  </div>

  <form [formGroup]="frmProduct" class="stack">
    <div class="field">
      <label for="name">Name</label>
      <input pInputText id="name" autocomplete="off" formControlName="name" />
    </div>

    <div class="field">
      <label for="price">Price</label>
      <input pInputText id="price" type="number" step="0.1" min="0" formControlName="price" autocomplete="off" />
    </div>

    <div class="field">
      <label for="category">Category</label>
      <p-select [options]="categories" formControlName="categoryName" placeholder="Select a category" class="w-full" />
    </div>

    <div class="field">
      <label for="description">Description</label>
      <input pInputText id="description" autocomplete="off" formControlName="description" />
    </div>

   <div class="field">
  <label>Upload Image</label>

 <p-fileUpload
  #fu
  mode="basic"
  [auto]="true"
  chooseLabel="Change Image"
  [showUploadButton]="false"
  [showCancelButton]="false"
  accept="image/*"
  (onSelect)="onFileSelected($event)">
</p-fileUpload>
</div>

@if (previewUrl) {
  <img [src]="previewUrl">
}
<div class="field">
  <label>Availability</label>
  <p-toggleButton formControlName="isAvailable" onLabel="Available" offLabel="Out of stock" offIcon="pi pi-times"></p-toggleButton>
</div>
    <div class="actions">
      <p-button label="Cancel" severity="secondary" (click)="hide()" />
      <p-button label="Save changes" (click)="saveProduct()" />
    </div>
  </form>
</div>
